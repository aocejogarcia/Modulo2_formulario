<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Introducción a la estructura básica de HTML">
        <title>Mi Primera Página HTML</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1> ¡Bienvenido a HTML!</h1>
        <p> Este es mi primer documento HTML estructurado correctamente</p>
        
        <form id="main-form" method="post" action="#" aria-label="Formulario de datos personales">
        <fieldset>
            <legend> Datos personales </legend>
            <label for="nombre_pila"> Nombre: </label>
            <input type="text" id="nombre_pila" name="nombre_pila" required>
            <br>
            <label for="apellido_paterno"> Apellido paterno: </label>
            <input type="text" id="apellido_paterno" name="apellido_paterno" required>
            <br>
            <label for="apellido_materno"> Apellido materno: </label>
            <input type="text" id="apellido_materno" name="apellido_materno" required>
            <br>
            <label for="edad"> Edad: </label>
            <input type="number" id="edad" name="edad" required>
            <br>
            <p> ¿Cuál es tu género? </p>
            <label> <input type="radio" name="genero" value="Mujer" required> Mujer </label>
            <label> <input type="radio" name="genero" value="Hombre" required> Hombre </label>
            <label> <input type="radio" name="genero" value="Prefiero no responder" required> Prefiero no responder </label>
            <p> ¿Cuál es tu sistema operativo favorito? </p>
            <label> <input type="radio" name="os" value="Windows"> Windows </label>
            <label> <input type="radio" name="os" value="MacOS"> MacOS </label>
            <label> <input type="radio" name="os" value="Linux"> Linux </label>
            <p> ¿Qué tecnologías utilizas? (Selecciona todas las que correspondan): </p>
            <label> <input type="checkbox" name="tech" value="html"> HTML </label>
            <label> <input type="checkbox" name="tech" value="css"> CSS </label>
            <label> <input type="checkbox" name="tech" value="javascript"> JavaScript </label> 
            <br>
            <br>
            <p class="section-title"> Comentarios finales </p>
            <br>
            <label for="comments"> Escribe tus comentarios: </label> <br>
            <textarea id="comments" name="comments" rows="5" cols="60"> </textarea>
            <br>
            <div class="form-actions">
                <button type="submit">Enviar</button>
            </div>
        </fieldset>
        </form>

        <script>
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('main-form');
            if (!form) return;
            form.addEventListener('submit', function(e) {
                var action = form.getAttribute('action') || '';
                var method = (form.getAttribute('method') || 'get').toLowerCase();

                // Evita enviar POST a '#' o a una ruta vacía, que causa HTTP 405 en muchos servidores
                if (method === 'post' && (action === '#' || action.trim() === '' || action === window.location.pathname)) {
                    e.preventDefault();
                    if (!form.checkValidity()) {
                        form.reportValidity();
                        return;
                    }
                    var msg = document.createElement('div');
                    msg.className = 'form-submit-message';
                    msg.setAttribute('role', 'status');
                    msg.setAttribute('aria-live', 'polite');
                    msg.tabIndex = -1;
                    msg.textContent = 'Envío simulado: el formulario no fue enviado a un servidor. Añade un atributo "action" válido para enviar los datos.';
                    form.parentNode.insertBefore(msg, form.nextSibling);
                    msg.focus();
                }
            });
        });
        </script>
    </body>
</html>
